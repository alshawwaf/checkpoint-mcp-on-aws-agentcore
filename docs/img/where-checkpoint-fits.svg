<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 585" font-family="Arial, Helvetica, sans-serif">
  <!-- self-contained light panel so it reads on GitHub light OR dark themes -->
  <rect x="0" y="0" width="1040" height="585" fill="#ffffff"/>

  <text x="500" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#41273c">Where Check Point fits on AWS Bedrock AgentCore</text>

  <!-- Agent -->
  <rect x="60" y="46" width="880" height="42" fill="#f7f5f6" stroke="#41273c" stroke-width="1.5"/>
  <text x="500" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#41273c">Agent — any framework, any model, any protocol</text>

  <!-- AgentCore chip + Build lane -->
  <rect x="60" y="100" width="118" height="24" rx="12" fill="#ffffff" stroke="#41273c" stroke-width="1.5"/>
  <text x="119" y="116" text-anchor="middle" font-size="12" font-weight="bold" fill="#41273c">AgentCore</text>
  <rect x="192" y="100" width="748" height="24" fill="#eae6ec" stroke="#d9d2d6" stroke-width="1"/>
  <text x="566" y="116" text-anchor="middle" font-size="12" fill="#41273c">Build — Harness · CLI · SDK  (models, tools, skills, memory)</text>

  <!-- ================= Primitive row 1 (y=142) ================= -->
  <!-- Built-in tools (not used) -->
  <rect x="60" y="142" width="205" height="92" fill="#f7f5f6" stroke="#d9d2d6" stroke-width="1"/>
  <rect x="60" y="142" width="205" height="26" fill="#b9b0b5"/>
  <text x="162" y="160" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Built-in tools</text>
  <text x="162" y="192" text-anchor="middle" font-size="11.5" fill="#41273c">Browser, code interpreter,</text>
  <text x="162" y="208" text-anchor="middle" font-size="11.5" fill="#41273c">knowledge bases, search</text>

  <!-- Gateway (SHARED: A + B) -->
  <rect x="283" y="142" width="205" height="92" fill="#ffffff" stroke="#41273c" stroke-width="2.5"/>
  <rect x="283" y="142" width="205" height="26" fill="#41273c"/>
  <text x="373" y="160" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Gateway</text>
  <rect x="436" y="147" width="19" height="16" rx="4" fill="#ee0c5d"/><text x="445.5" y="159" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">A</text>
  <rect x="459" y="147" width="19" height="16" rx="4" fill="#741984"/><text x="468.5" y="159" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">B</text>
  <text x="385" y="192" text-anchor="middle" font-size="11.5" fill="#41273c">One MCP endpoint;</text>
  <text x="385" y="208" text-anchor="middle" font-size="11.5" fill="#41273c">targets + interceptors</text>

  <!-- Identity (A) -->
  <rect x="506" y="142" width="205" height="92" fill="#ffffff" stroke="#ee0c5d" stroke-width="2.5"/>
  <rect x="506" y="142" width="205" height="26" fill="#ee0c5d"/>
  <text x="608" y="160" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Identity</text>
  <rect x="682" y="147" width="19" height="16" rx="4" fill="#ffffff"/><text x="691.5" y="159" text-anchor="middle" font-size="11" font-weight="bold" fill="#ee0c5d">A</text>
  <text x="608" y="192" text-anchor="middle" font-size="11.5" fill="#41273c">Inbound + outbound</text>
  <text x="608" y="208" text-anchor="middle" font-size="11.5" fill="#41273c">authentication</text>

  <!-- Memory (USED by the security-ops agent; opt-in session flag) -->
  <rect x="729" y="142" width="205" height="92" fill="#ffffff" stroke="#41273c" stroke-width="2.5"/>
  <rect x="729" y="142" width="205" height="26" fill="#41273c"/>
  <text x="831" y="160" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Memory</text>
  <text x="831" y="192" text-anchor="middle" font-size="11.5" fill="#41273c">Cross-session recall for</text>
  <text x="831" y="208" text-anchor="middle" font-size="11.5" fill="#41273c">the agent (opt-in, --session)</text>

  <!-- ================= Primitive row 2 (y=250) ================= -->
  <!-- Policy (B) -->
  <rect x="60" y="250" width="205" height="92" fill="#ffffff" stroke="#741984" stroke-width="2.5"/>
  <rect x="60" y="250" width="205" height="26" fill="#741984"/>
  <text x="162" y="268" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Policy</text>
  <rect x="236" y="255" width="19" height="16" rx="4" fill="#ffffff"/><text x="245.5" y="267" text-anchor="middle" font-size="11" font-weight="bold" fill="#741984">B</text>
  <text x="162" y="300" text-anchor="middle" font-size="11.5" fill="#41273c">Authorization control</text>
  <text x="162" y="316" text-anchor="middle" font-size="11.5" fill="#41273c">(Cedar + Guardrails)</text>

  <!-- Payments (not used) -->
  <rect x="283" y="250" width="205" height="92" fill="#f7f5f6" stroke="#d9d2d6" stroke-width="1"/>
  <rect x="283" y="250" width="205" height="26" fill="#b9b0b5"/>
  <text x="385" y="268" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Payments</text>
  <text x="385" y="300" text-anchor="middle" font-size="11.5" fill="#41273c">Automate</text>
  <text x="385" y="316" text-anchor="middle" font-size="11.5" fill="#41273c">microtransactions</text>

  <!-- Registry (not used) -->
  <rect x="506" y="250" width="205" height="92" fill="#f7f5f6" stroke="#d9d2d6" stroke-width="1"/>
  <rect x="506" y="250" width="205" height="26" fill="#b9b0b5"/>
  <text x="608" y="268" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Registry</text>
  <text x="608" y="300" text-anchor="middle" font-size="11.5" fill="#41273c">Agents, MCP servers,</text>
  <text x="608" y="316" text-anchor="middle" font-size="11.5" fill="#41273c">tools, skills</text>

  <!-- Runtime (A) -->
  <rect x="729" y="250" width="205" height="92" fill="#ffffff" stroke="#ee0c5d" stroke-width="2.5"/>
  <rect x="729" y="250" width="205" height="26" fill="#ee0c5d"/>
  <text x="831" y="268" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Runtime</text>
  <rect x="905" y="255" width="19" height="16" rx="4" fill="#ffffff"/><text x="914.5" y="267" text-anchor="middle" font-size="11" font-weight="bold" fill="#ee0c5d">A</text>
  <text x="831" y="300" text-anchor="middle" font-size="11.5" fill="#41273c">Hosts agents &amp; tools</text>
  <text x="831" y="316" text-anchor="middle" font-size="11.5" fill="#41273c">(the @chkp container)</text>

  <!-- ================= Bottom bar (y=358) ================= -->
  <!-- Observability (B) -->
  <rect x="60" y="358" width="425" height="56" fill="#ffffff" stroke="#741984" stroke-width="2.5"/>
  <rect x="60" y="358" width="425" height="26" fill="#741984"/>
  <text x="272" y="376" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Observability</text>
  <rect x="456" y="363" width="19" height="16" rx="4" fill="#ffffff"/><text x="465.5" y="375" text-anchor="middle" font-size="11" font-weight="bold" fill="#741984">B</text>
  <text x="272" y="402" text-anchor="middle" font-size="11.5" fill="#41273c">Monitor &amp; debug — where ALLOW / DENY decisions are logged</text>

  <!-- Evaluations (not used) -->
  <rect x="515" y="358" width="425" height="56" fill="#f7f5f6" stroke="#d9d2d6" stroke-width="1"/>
  <rect x="515" y="358" width="425" height="26" fill="#b9b0b5"/>
  <text x="727" y="376" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Evaluations</text>
  <text x="727" y="402" text-anchor="middle" font-size="11.5" fill="#41273c">Batch &amp; online evaluations, custom evaluators</text>

  <!-- ================= Legend ================= -->
  <rect x="60" y="440" width="16" height="16" fill="#ee0c5d"/>
  <text x="84" y="453" font-size="12.5" fill="#41273c"><tspan font-weight="bold">Mode A — Check Point as tools (always present):</tspan> a @chkp MCP server runs on <tspan font-weight="bold">Runtime</tspan> and is registered as a target on the <tspan font-weight="bold">Gateway</tspan>.</text>

  <rect x="60" y="466" width="16" height="16" fill="#741984"/>
  <text x="84" y="479" font-size="12.5" fill="#41273c"><tspan font-weight="bold">Mode B — Check Point as a guardrail (optional):</tspan> signals feed a <tspan font-weight="bold">Policy</tspan> (Cedar + Bedrock Guardrails) enforced at the <tspan font-weight="bold">Gateway</tspan>; decisions surface in <tspan font-weight="bold">Observability</tspan>.</text>

  <rect x="60" y="492" width="16" height="16" fill="#41273c"/>
  <text x="84" y="505" font-size="12.5" fill="#41273c"><tspan font-weight="bold">Gateway</tspan> — the shared control point both modes pass through.</text>

  <text x="60" y="540" font-size="10.5" font-style="italic" fill="#6b5560">Redrawn schematic of the AWS Bedrock AgentCore building blocks — not an AWS asset. Mode B's Check Point signal binding is announced-upcoming;</text>
  <text x="60" y="555" font-size="10.5" font-style="italic" fill="#6b5560">the AWS-native Policy + Guardrails substrate it plugs into is GA (the default). Check Point's own AI Guardrail (Lakera Guard) is a GA drop-in</text>
  <text x="60" y="570" font-size="10.5" font-style="italic" fill="#6b5560">alternative, run as a client-side prompt screen. Grey blocks are AgentCore primitives this integration does not use.</text>
</svg>
