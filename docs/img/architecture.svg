<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1420 800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Check Point MCP servers behind one AWS Bedrock AgentCore gateway; a security-ops agent runs locally or hosted on AgentCore Runtime with optional memory; consumers reach it from the CLI, any MCP client, Postman via SigV4, or Teams and n8n through a bearer-token bridge; an optional AI guardrail screens prompts before the model runs, AWS-native AgentCore Policy by default or Check Point AI Guardrail (Lakera) as a drop-in opt-in provider">
  <defs>
    <linearGradient id="cp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff2d95"/>
      <stop offset="1" stop-color="#a02bce"/>
    </linearGradient>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8b90a8"/>
    </marker>
    <marker id="am" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#e0117f"/>
    </marker>
    <style>
      .p{fill:#1c2036} .m{fill:#565d78} .f{fill:#8489a0}
      .t{font-weight:700} .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
      .zone{fill:#f7f8fd;stroke:#e2e5f1}
      .node{fill:#ffffff;stroke:#d9ddeb}
      .agent{fill:#fdf4fa;stroke:url(#cp)}
      .edge{stroke:#8b90a8;stroke-width:2;fill:none}
      .edgeA{stroke:#e0117f;stroke-width:2.5;fill:none}
    </style>
  </defs>

  <rect x="1" y="1" width="1418" height="798" rx="18" fill="#ffffff" stroke="#e2e5f1" stroke-width="1.5"/>

  <!-- title -->
  <rect x="40" y="32" width="6" height="30" rx="3" fill="url(#cp)"/>
  <text x="58" y="47" class="p t" font-size="21">Check Point MCP on AWS Bedrock AgentCore</text>
  <text x="58" y="70" class="m" font-size="14">15 <tspan class="mono">@chkp</tspan> MCP servers  ·  one authenticated gateway  ·  an agent you can call from anywhere</text>

  <!-- ===================== zone labels + AWS panel ===================== -->
  <text x="60"   y="150" class="f t" font-size="12" letter-spacing="1.5">CONSUMERS</text>
  <rect x="340" y="164" width="800" height="606" rx="14" class="zone"/>
  <text x="364"  y="150" class="f t" font-size="12" letter-spacing="1.5">AWS  ·  BEDROCK  AGENTCORE  (us-east-1)</text>
  <text x="1190" y="150" class="f t" font-size="12" letter-spacing="1.5">CHECK POINT ESTATE</text>

  <!-- ===================== consumer column ===================== -->
  <rect x="40" y="190" width="240" height="96" rx="10" class="agent" stroke-width="2"/>
  <text x="56" y="216" class="p t" font-size="13.5">chkpmcpaws CLI</text>
  <text x="56" y="234" class="m" font-size="11.5">local agent, streaming in your</text>
  <text x="56" y="250" class="m" font-size="11.5">terminal · MCP + Bearer JWT</text>
  <text x="56" y="268" class="f" font-size="10.5">opt-in screen: Check Point AI Guardrail</text>

  <rect x="40" y="310" width="240" height="66" rx="10" class="node"/>
  <text x="56" y="336" class="p t" font-size="13">Any MCP client</text>
  <text x="56" y="355" class="f" font-size="11">Claude Desktop · IDE · n8n</text>

  <rect x="40" y="400" width="240" height="66" rx="10" class="node"/>
  <text x="56" y="426" class="p t" font-size="13">Teams · n8n · curl</text>
  <text x="56" y="445" class="f" font-size="11">bearer token over HTTPS → bridge</text>

  <rect x="40" y="490" width="240" height="66" rx="10" class="node"/>
  <text x="56" y="516" class="p t" font-size="13">Postman · your app</text>
  <text x="56" y="535" class="f" font-size="11">InvokeAgentRuntime · AWS SigV4</text>

  <!-- ===================== cognito ===================== -->
  <rect x="380" y="190" width="200" height="64" rx="10" class="node"/>
  <text x="396" y="216" class="p t" font-size="13">Amazon Cognito</text>
  <text x="396" y="236" class="m" font-size="11.5">inbound JWT (M2M)</text>

  <!-- ===================== gateway (hub) ===================== -->
  <rect x="630" y="230" width="220" height="220" rx="14" class="agent" stroke-width="2.5"/>
  <path d="M630 264 V244 q0-14 14-14 h192 q14 0 14 14 v20 z" fill="url(#cp)"/>
  <text x="648" y="252" fill="#fff" font-size="12.5" class="t">AgentCore Gateway</text>
  <text x="648" y="292" class="p t mono" font-size="12.5">chkp-mcp-gw</text>
  <text x="648" y="316" class="m" font-size="11.5">one authenticated</text>
  <text x="648" y="332" class="m" font-size="11.5">MCP endpoint</text>
  <text x="648" y="356" class="m" font-size="11.5">every server's tools,</text>
  <text x="648" y="372" class="f mono" font-size="10">&lt;server&gt;___&lt;tool&gt;</text>
  <text x="648" y="404" class="f" font-size="9.5">+ optional guardrail policy point</text>

  <!-- cognito -> gateway -->
  <path d="M580 226 C 605 240, 615 258, 630 278" class="edge" stroke-dasharray="4 3" marker-end="url(#a)"/>

  <!-- ===================== bridge + hosted agent ===================== -->
  <rect x="380" y="440" width="200" height="70" rx="10" class="node"/>
  <text x="396" y="466" class="p t" font-size="12.5">Agent bridge</text>
  <text x="396" y="484" class="f" font-size="10">API Gateway + Lambda</text>
  <text x="396" y="499" class="f" font-size="10">bearer auth · clean JSON out</text>

  <rect x="380" y="550" width="270" height="100" rx="12" class="agent" stroke-width="2.5"/>
  <text x="398" y="578" class="p t" font-size="14">Security-Ops Agent</text>
  <text x="398" y="598" class="m" font-size="11.5">hosted · AgentCore Runtime <tspan class="mono" font-size="10.5">chkp_agent</tspan></text>
  <text x="398" y="616" class="m" font-size="11.5">Claude on Amazon Bedrock</text>
  <text x="398" y="634" class="f" font-size="10.5">prompt caching · token telemetry</text>

  <!-- consumer edges -->
  <!-- CLI (local agent) -> gateway -->
  <path d="M280 238 C 420 265, 520 280, 630 300" class="edgeA" marker-end="url(#am)"/>
  <!-- any MCP client -> gateway -->
  <path d="M280 343 C 420 345, 520 340, 630 336" class="edge" marker-end="url(#a)"/>
  <!-- teams -> bridge -->
  <path d="M280 433 C 320 440, 345 455, 380 468" class="edge" marker-end="url(#a)"/>
  <!-- postman -> hosted agent -->
  <path d="M280 523 C 320 530, 345 560, 380 585" class="edge" marker-end="url(#a)"/>
  <!-- bridge -> hosted agent -->
  <path d="M480 510 L480 550" class="edge" marker-end="url(#a)"/>
  <!-- hosted agent -> gateway -->
  <path d="M650 575 C 700 555, 722 505, 736 450" class="edgeA" marker-end="url(#am)"/>
  <text x="752" y="525" class="p" font-size="10">MCP · JWT</text>

  <!-- ===================== runtimes (one per server) ===================== -->
  <text x="900" y="208" class="f" font-size="11">one AgentCore Runtime per <tspan class="mono">@chkp</tspan> server</text>
  <g class="mono" font-size="11.5">
    <rect x="900" y="222" width="210" height="40" rx="8" class="node"/>
    <text x="916" y="247" class="p">quantum-management</text>
    <rect x="900" y="270" width="210" height="40" rx="8" class="node"/>
    <text x="916" y="295" class="p">threat-prevention</text>
    <rect x="900" y="318" width="210" height="40" rx="8" class="node"/>
    <text x="916" y="343" class="p">management-logs</text>
    <rect x="900" y="366" width="210" height="40" rx="8" class="node"/>
    <text x="916" y="391" class="p">documentation</text>
    <rect x="900" y="414" width="210" height="40" rx="8" fill="#f7f8fd" stroke="#c9cede" stroke-dasharray="4 3"/>
    <text x="916" y="439" class="m" font-size="11">+ 5 more · 15 total</text>
  </g>
  <text x="900" y="480" class="f" font-size="10">9 by default · own secret each</text>
  <text x="900" y="496" class="f" font-size="10">Mgmt API / HTTPS to the estate</text>

  <!-- gateway -> runtimes -->
  <path d="M850 338 L900 338" class="edgeA" marker-end="url(#am)"/>
  <text x="875" y="326" class="f" font-size="9.5" text-anchor="middle">SigV4</text>

  <!-- ===================== AI Guardrail (optional pre-model screen) ===================== -->
  <!-- Bottom row, 50px gaps: Memory (380-600) · Guardrail (650-850) · Secrets (900-1110) -->
  <rect x="650" y="680" width="200" height="76" rx="10" class="node" stroke-dasharray="5 3"/>
  <text x="666" y="704" class="p t" font-size="12">AI Guardrail <tspan class="f" font-weight="400" font-size="9.5">(optional)</tspan></text>
  <text x="666" y="722" class="f" font-size="9.5">pre-model screen · your choice</text>
  <text x="666" y="737" class="f" font-size="9.5">Check Point (Lakera), or</text>
  <text x="666" y="751" class="f" font-size="9.5">AWS AgentCore Policy · default</text>
  <!-- agent -> guardrail (screens the prompt before the model, dashed) -->
  <path d="M600 650 L710 680" class="edge" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="722" y="672" class="f" font-size="9">screen · optional</text>

  <!-- memory -->
  <rect x="380" y="680" width="220" height="76" rx="10" class="node"/>
  <text x="398" y="704" class="p t" font-size="12.5">AgentCore Memory</text>
  <text x="398" y="722" class="f mono" font-size="10.5">chkp_mcp_memory · --session</text>
  <text x="398" y="738" class="f" font-size="10">recall + save across sessions</text>
  <path d="M470 650 L470 680" class="edge" stroke-dasharray="4 3" marker-end="url(#a)" marker-start="url(#a)"/>

  <!-- secrets manager -->
  <rect x="900" y="680" width="210" height="66" rx="10" class="node"/>
  <text x="916" y="706" class="p t" font-size="12.5">AWS Secrets Manager</text>
  <text x="916" y="724" class="f" font-size="10.5">per-server credentials</text>
  <!-- secrets -> runtimes: a clear right-side corridor (captions end ~x=1050) -->
  <path d="M1090 680 L1090 458" class="edge" marker-end="url(#a)"/>
  <text x="1082" y="560" class="f" font-size="10" text-anchor="end">read at container start</text>

  <!-- ===================== check point estate ===================== -->
  <rect x="1190" y="300" width="200" height="200" rx="12" class="node"/>
  <text x="1212" y="334" class="p t" font-size="15">Check Point estate</text>
  <text x="1212" y="366" class="m" font-size="12.5">Management server</text>
  <text x="1212" y="388" class="m" font-size="12.5">Smart-1 Cloud</text>
  <text x="1212" y="410" class="m" font-size="12.5">Gateways</text>
  <text x="1212" y="448" class="f" font-size="11.5">your real security data</text>

  <!-- runtimes -> estate: straight, aligned with the documentation runtime row -->
  <path d="M1110 386 L1190 386" class="edge" marker-end="url(#a)"/>
</svg>
